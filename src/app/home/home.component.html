<section class="home d-flex justify-content-center align-items-center text-center py-5" id="home">
    <header>
        <h1>Nick White</h1>
        <h2>Software Engineer</h2>
        <p>
            <a [title]="workingAt.title" [href]="workingAt.link" target="_blank">{{ workingAt.text }}</a>
            working with
            <ng-container *ngFor="let with of workingWith; let last = last">
                <a
                    target="_blank"
                    [title]="with.title"
                    [href]="with.link">
                    {{ with.text }}{{ last ? '' : ', '}}
                </a>
            </ng-container>
        </p>
    </header>
</section>
